name: Build & Release AAB

on:
  push:
    tags:
      - 'v*'           # triggers on: git tag v1.0.0 && git push --tags
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. JDK 17 ────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Decode keystore from secret ───────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > tasbih-release.keystore

      # ── 4. Build signed release AAB ──────────────
      - name: Build Release AAB
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS:     ${{ secrets.KEY_ALIAS }}
          KEY_PASS:      ${{ secrets.KEY_PASS }}
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/tasbih-release.keystore \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASS \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASS

      # ── 5. Upload AAB as artifact ─────────────────
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: tasbih-release-${{ github.ref_name }}
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      # ── 6. Create GitHub Release ──────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/bundle/release/app-release.aab
          name: "تسابيح ${{ github.ref_name }}"
          body: |
            ## تسابيح ${{ github.ref_name }}
            
            ### التثبيت
            هذا ملف AAB مخصص لرفعه مباشرة على Google Play Console.
            
            ### Installation
            This AAB file is for uploading to Google Play Console directly.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
